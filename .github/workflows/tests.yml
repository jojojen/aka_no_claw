name: tests

on:
  pull_request:

jobs:
  goal-loop-evals:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Sibling repos, checked out next to this one (`../<repo>`) so the
      # PYTHONPATH below mirrors the local multi-repo dev layout. These
      # provide pure-stdlib modules only (market_monitor, telegram_nl,
      # telegram_core) — no pip install needed for the slice this job runs.
      - uses: actions/checkout@v4
        with:
          repository: jojojen/price_monitor_bot
          path: ../price_monitor_bot

      - uses: actions/checkout@v4
        with:
          repository: jojojen/telegram_nl
          path: ../telegram_nl

      - uses: actions/checkout@v4
        with:
          repository: jojojen/telegram_core
          path: ../telegram_core

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pytest
        run: python -m pip install pytest

      - name: Run goal-loop eval slice
        run: |
          PYTHONPATH=.:src:../price_monitor_bot/src:../telegram_nl/src:../telegram_core/src \
          python -m pytest \
          tests/test_eval_cases.py \
          tests/test_goal_loop.py \
          tests/test_goal_planner.py \
          tests/test_task_loop.py \
          tests/test_task_workspace.py -q
