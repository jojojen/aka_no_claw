name: tests

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fast-pr:
    name: Fast PR (syntax + package build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Byte-compile source tree (syntax gate)
        run: python -m compileall -q src tests

      - name: Build sdist + wheel (packaging metadata gate)
        run: |
          python -m pip install --upgrade build
          python -m build

      - name: Clean wheel install smoke (fresh venv, D1.4)
        # --no-deps because sibling deps (telegram-core etc.) are bare names
        # only resolvable via local editable installs / the pinned _deps
        # checkout, never from an index.
        run: |
          python -m venv /tmp/wheel-smoke
          /tmp/wheel-smoke/bin/pip install --no-deps dist/*.whl
          /tmp/wheel-smoke/bin/python -c "import openclaw_adapter; print('wheel smoke OK:', openclaw_adapter.__doc__)"

      - name: Static checks (Ruff, non-blocking baseline)
        # Reports the existing repo-wide backlog without failing the build
        # (C4: don't make a legacy backlog a required gate in the same PR
        # that introduces the tool). Flip to blocking once the backlog is
        # cleared or this narrows to a changed-files-only gate.
        continue-on-error: true
        run: |
          python -m pip install ruff
          ruff check src tests

  full-offline:
    name: Full offline suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Companion repos, checked out as subdirectories of this workspace
      # (actions/checkout refuses a `path` outside $GITHUB_WORKSPACE, so a
      # true `../<repo>` sibling — matching the local multi-repo dev layout
      # — isn't possible here). None of these are `pip install`-able from an
      # index (price-monitor-bot/telegram-core/telegram-nl/sns-monitor-bot
      # are declared as bare names in pyproject.toml precisely because they
      # only resolve via local editable installs), so sys.path injection via
      # PYTHONPATH below is the substitute. Revisions are NOT floating: the
      # step below detaches each checkout to the full SHA pinned in
      # config/workspace-lock.toml (#73), which is the single source of
      # truth for CI/deploy resolution. fetch-depth: 0 is required so the
      # pinned SHA is reachable even when the default branch has moved on.
      - uses: actions/checkout@v4
        with:
          repository: jojojen/price_monitor_bot
          path: _deps/price_monitor_bot
          fetch-depth: 0

      - uses: actions/checkout@v4
        with:
          repository: jojojen/telegram_nl
          path: _deps/telegram_nl
          fetch-depth: 0

      - uses: actions/checkout@v4
        with:
          repository: jojojen/telegram_core
          path: _deps/telegram_core
          fetch-depth: 0

      - uses: actions/checkout@v4
        with:
          repository: jojojen/sns_monitor_bot
          path: _deps/sns_monitor_bot
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install runtime + test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install \
            pytest truststore \
            beautifulsoup4 broadlink multipart numpy requests \
            imagehash pillow \
            twikit python-dotenv \
            SudachiPy SudachiDict-full

      - name: Resolve siblings to workspace-lock revisions (#73)
        run: |
          python - <<'RESOLVE'
          import subprocess, sys, tomllib
          from pathlib import Path

          with open("config/workspace-lock.toml", "rb") as f:
              lock = tomllib.load(f)

          for name, pkg in lock["packages"].items():
              repo_dir = pkg["repository"].rstrip("/").removesuffix(".git").rsplit("/", 1)[-1]
              path = Path("_deps") / repo_dir
              if not path.is_dir():
                  sys.exit(f"FATAL: sibling checkout missing for {name}: {path}")
              rev = pkg["revision"]
              subprocess.run(
                  ["git", "-C", str(path), "checkout", "--detach", rev],
                  check=True,
              )
              head = subprocess.run(
                  ["git", "-C", str(path), "rev-parse", "HEAD"],
                  capture_output=True, text=True, check=True,
              ).stdout.strip()
              if head != rev:
                  sys.exit(f"FATAL: {name} HEAD {head} != pinned {rev}")
              print(f"{name}: pinned to {rev}")
          RESOLVE

      - name: Validate workspace against lock manifest (strict)
        run: |
          PYTHONPATH=src python -m openclaw_adapter.workspace_validator \
            --lock-file config/workspace-lock.toml \
            --workspace-root _deps \
            --strict

      - name: Print resolved sibling revisions
        run: |
          echo "aka_no_claw:        $(git rev-parse HEAD)"
          echo "price_monitor_bot:  $(git -C _deps/price_monitor_bot rev-parse HEAD)"
          echo "telegram_nl:        $(git -C _deps/telegram_nl rev-parse HEAD)"
          echo "telegram_core:      $(git -C _deps/telegram_core rev-parse HEAD)"
          echo "sns_monitor_bot:    $(git -C _deps/sns_monitor_bot rev-parse HEAD)"

      - name: Run full offline test suite
        run: |
          PYTHONPATH=.:src:_deps/price_monitor_bot/src:_deps/telegram_nl/src:_deps/telegram_core/src:_deps/sns_monitor_bot/src \
          python -m pytest -q -rs
