name: tests

on:
  pull_request:

jobs:
  goal-loop-evals:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pytest
        run: python -m pip install pytest

      - name: Run goal-loop eval slice
        run: |
          PYTHONPATH=.:src:../price_monitor_bot/src:../telegram_nl/src \
          python -m pytest \
          tests/test_eval_cases.py \
          tests/test_goal_loop.py \
          tests/test_goal_planner.py \
          tests/test_task_loop.py \
          tests/test_task_workspace.py -q
