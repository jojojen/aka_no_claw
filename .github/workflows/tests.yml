name: tests

on:
  pull_request:

jobs:
  goal-loop-evals:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Companion repos, checked out as subdirectories of this workspace
      # (actions/checkout refuses a `path` outside $GITHUB_WORKSPACE, so a
      # true `../<repo>` sibling — matching the local multi-repo dev layout
      # — isn't possible here). Their own code is pure-stdlib (market_monitor,
      # telegram_nl, telegram_core), so no `pip install -e` of them is needed —
      # sys.path injection below is enough. But assistant_runtime.tls imports
      # the real PyPI package `truststore` (a price_monitor_bot dependency
      # normally pulled in transitively via editable install locally), so
      # that one still needs an explicit pip install — see below.
      - uses: actions/checkout@v4
        with:
          repository: jojojen/price_monitor_bot
          path: _deps/price_monitor_bot

      - uses: actions/checkout@v4
        with:
          repository: jojojen/telegram_nl
          path: _deps/telegram_nl

      - uses: actions/checkout@v4
        with:
          repository: jojojen/telegram_core
          path: _deps/telegram_core

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pytest
        run: python -m pip install pytest truststore

      - name: Run goal-loop eval slice
        run: |
          PYTHONPATH=.:src:_deps/price_monitor_bot/src:_deps/telegram_nl/src:_deps/telegram_core/src \
          python -m pytest \
          tests/test_eval_cases.py \
          tests/test_goal_loop.py \
          tests/test_goal_planner.py \
          tests/test_task_loop.py \
          tests/test_task_workspace.py -q
