name: docs-health

on:
  push:
    branches: [main]
  pull_request:

jobs:
  docs-health:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Documentation health check (indexing, metadata, archive, links)
        run: python scripts/check_docs_health.py

      - name: Manifest check (status vocabulary, repo/subsystem fields)
        run: python scripts/check_manifest.py

      - name: Documentation drift check (manifest vs CURRENT_STATE)
        run: python scripts/check_doc_drift.py
