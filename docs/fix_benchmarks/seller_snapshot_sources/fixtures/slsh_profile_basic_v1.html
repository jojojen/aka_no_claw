<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="robots" content="noindex">
  <title>SLSH fixture seller profile basic v1</title>
</head>
<body data-benchmark="seller-snapshot-sources" data-source-code="SLSH">
  <header>
    <h1>SYNTHETIC TEST PAGE - NOT A REAL WEBSITE</h1>
    <strong>SLSH synthetic seller source</strong>
    <p>Benchmark fixture only. This page is not a real commerce website.</p>
  </header>

  <main data-page-kind="seller-profile" data-profile-id="SLSH-SELLER-0001">
    <section class="profile-card direct-fields">
      <h2 data-testid="display-name">星野サンプル堂</h2>
      <span data-testid="total-reviews">152</span>
      <span data-testid="listing-count">108</span>
      <span data-testid="followers-count">3</span>
      <span data-testid="following-count">38</span>
      <span data-testid="verified-badge">本人確認済</span>
    </section>
    <section class="review-summary">
      <span data-testid="seller-positive" data-review-role="seller" data-review-rating="positive" data-count="2">seller good</span>
      <span data-testid="seller-negative" data-review-role="seller" data-review-rating="negative" data-count="1">seller bad</span>
      <span data-testid="buyer-positive" data-review-role="buyer" data-review-rating="positive" data-count="1">buyer good</span>
      <span data-testid="buyer-negative" data-review-role="buyer" data-review-rating="negative" data-count="0">buyer bad</span>
    </section>
  </main>
</body>
</html>
